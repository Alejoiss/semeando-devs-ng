<div class="flex flex-col gap-8">
    <!-- Header with Back Button -->
    <div class="flex items-center gap-4">
        <button type="button" (click)="goBack()" class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors pl-4">
            <span class="material-symbols-rounded">arrow_back</span>
            <span class="text-label-lg font-bold">Voltar ao Submódulo</span>
        </button>
    </div>

    <!-- Main Title -->
    <div class="flex flex-col gap-2 pl-4">
        <h1 class="text-display-sm text-on-surface font-bold">
            {{ lessonId() ? 'Editar Lição' : 'Criar Nova Lição' }}
        </h1>
        <p class="text-on-surface-variant text-body-md">Configure o conteúdo, materiais de apoio e quiz da lição.</p>
    </div>

    <!-- Tabs Container -->
    <div class="flex flex-col gap-6 bg-surface-container-low p-6 md:p-8 rounded-2xl shadow-lg">
        <!-- Tabs Navigation -->
        <div class="flex items-center gap-4 bg-surface-container-lowest/30 p-1 rounded-xl w-fit">
            <button
                type="button"
                (click)="setTab('content')"
                [class]="activeTab() === 'content' ? 'bg-surface-bright/80 text-primary shadow-lg backdrop-blur-md' : 'text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest/50'"
                class="px-8 py-3 rounded-lg text-label-lg font-bold transition-all flex items-center gap-2"
            >
                <span class="material-symbols-rounded text-[20px]">article</span>
                Conteúdo
            </button>
            <button
                type="button"
                (click)="lessonId() ? setTab('extra') : null"
                [class]="activeTab() === 'extra' ? 'bg-surface-bright/80 text-primary shadow-lg backdrop-blur-md' : 'text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest/50'"
                [class.opacity-50]="!lessonId()"
                [class.cursor-not-allowed]="!lessonId()"
                class="px-8 py-3 rounded-lg text-label-lg font-bold transition-all flex items-center gap-2"
            >
                <span class="material-symbols-rounded text-[20px]">attachment</span>
                Materiais extras
            </button>
            <button
                type="button"
                (click)="lessonId() ? setTab('quiz') : null"
                [class]="activeTab() === 'quiz' ? 'bg-surface-bright/80 text-primary shadow-lg backdrop-blur-md' : 'text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest/50'"
                [class.opacity-50]="!lessonId()"
                [class.cursor-not-allowed]="!lessonId()"
                class="px-8 py-3 rounded-lg text-label-lg font-bold transition-all flex items-center gap-2"
            >
                <span class="material-symbols-rounded text-[20px]">quiz</span>
                Quiz
            </button>
        </div>

        <!-- Dynamic Content Area -->
        <div class="flex flex-col gap-6 mt-4">
            @switch (activeTab()) {
                @case ('content') {
                    <app-tab-content [subModuleId]="subModuleId()" [lessonId]="lessonId()" />
                }
                @case ('extra') {
                    <app-tab-extra-material [lessonId]="lessonId()" />
                }
                @case ('quiz') {
                    <app-tab-quiz [lessonId]="lessonId()" />
                }
            }
        </div>
    </div>
</div>
