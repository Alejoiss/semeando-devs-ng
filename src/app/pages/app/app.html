<div class="min-h-screen bg-background text-on-background font-body selection:bg-primary/30">
    <app-internal-header></app-internal-header>

    @if (navigationService.isSidebarOpen()) {
        <div (click)="navigationService.closeSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 md:hidden"></div>
    }

    <app-aside-menu></app-aside-menu>

    <main class="md:pl-64 pt-24 pb-24 min-h-screen flex flex-col justify-between">
        <div class="flex-grow w-full">
            <router-outlet></router-outlet>
        </div>
        <div class="w-full max-w-4xl mx-auto px-6 mt-12 select-none">
            <app-ad-banner adSlot="2222222222" adFormat="horizontal"></app-ad-banner>
        </div>
    </main>

    <app-newsletter-modal></app-newsletter-modal>
</div>
