@if (isVisible() && newsletterData()) {
<div class="fixed inset-0 z-[9999] flex items-center justify-center p-4 md:p-8" @overlayAnimation>
    <!-- Glassmorphic Backdrop -->
    <div class="absolute inset-0 bg-background/60 backdrop-blur-xl" (click)="closeAndAcknowledge()"></div>

    <!-- Modal Container -->
    <div class="relative w-full max-w-xl md:max-w-2xl h-auto max-h-[90vh] md:max-h-[800px] bg-surface-container rounded-lg overflow-hidden shadow-2xl flex flex-col border border-outline-variant/10"
         @modalAnimation>

        <!-- Close Icon -->
        <button (click)="closeAndAcknowledge()" class="absolute top-4 right-4 z-10 w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-highest/80 text-on-surface hover:bg-surface-bright transition-colors active:scale-95 border border-outline-variant/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <!-- Header area -->
        <div class="relative h-24 sm:h-32 w-full bg-surface-container-low flex items-center px-6 md:px-10 flex-shrink-0">
            <div class="absolute inset-0 bg-gradient-to-r from-primary/10 to-transparent"></div>
            <div class="px-4 py-1.5 bg-primary/20 text-primary backdrop-blur-md rounded-full border border-primary/20 relative z-10">
                <span class="font-label text-xs font-bold tracking-[0.1em] uppercase">Novidade</span>
            </div>
        </div>

        <!-- Newsletter Content -->
        <div class="flex-1 w-full p-6 md:p-10 flex flex-col bg-surface-container min-h-0">
            <div class="flex-1 overflow-y-auto mb-6 pr-2 custom-scrollbar">
                <div class="flex flex-col gap-4 font-body text-on-surface-variant text-sm md:text-base leading-relaxed" 
                     [innerHTML]="newsletterData()?.newsletter?.body">
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 mt-auto">
                @if (newsletterData()?.newsletter?.cta_label) {
                    <button (click)="onCtaClick()" [disabled]="isLoading()"
                            class="flex-1 py-3 md:py-4 bg-gradient-to-r from-primary to-primary-dim text-background font-bold rounded-xl shadow-[0_0_20px_rgba(63,194,251,0.25)] hover:shadow-[0_0_30px_rgba(63,194,251,0.4)] transition-all active:scale-[0.98] text-sm md:text-base disabled:opacity-50">
                        {{ newsletterData()?.newsletter?.cta_label }}
                    </button>
                    <button (click)="closeAndAcknowledge()" [disabled]="isLoading()"
                            class="px-8 md:px-10 py-3 md:py-4 bg-surface-container-high text-on-surface font-bold rounded-xl hover:bg-surface-bright transition-colors active:scale-[0.98] text-sm md:text-base disabled:opacity-50">
                        Fechar
                    </button>
                } @else {
                    <button (click)="closeAndAcknowledge()" [disabled]="isLoading()"
                            class="w-full py-3 md:py-4 bg-surface-container-high text-on-surface font-bold rounded-xl hover:bg-surface-bright transition-colors active:scale-[0.98] text-sm md:text-base disabled:opacity-50 border border-outline-variant/10">
                        Fechar
                    </button>
                }
            </div>
        </div>
    </div>
</div>
}
