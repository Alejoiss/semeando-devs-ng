@if (achievement()) {
<div class="fixed inset-0 z-[9999] flex items-center justify-center p-4 md:p-8" @overlayAnimation>
    <!-- Glassmorphic Backdrop -->
    <div class="absolute inset-0 bg-background/60 backdrop-blur-xl" (click)="close()"></div>

    <!-- Modal Container -->
    <div class="relative w-full max-w-xl md:max-w-2xl h-auto max-h-[90vh] md:h-[85vh] md:max-h-[800px] bg-surface-container rounded-lg overflow-hidden shadow-2xl flex flex-col border border-outline-variant/10"
         @modalAnimation>

        <!-- Achievement Image -->
        <div class="relative h-48 sm:h-64 md:h-[70%] w-full bg-surface-container-low overflow-hidden flex-shrink-0">
            <img [src]="'assets/achievements/' + achievement().icon"
                 [alt]="achievement().name"
                 class="w-full h-full object-cover">

            <!-- Gradient Overlay -->
            <div class="absolute bottom-0 left-0 right-0 h-32 md:h-48 bg-gradient-to-t from-surface-container to-transparent"></div>

            <!-- Floating Label -->
            <div class="absolute top-6 left-6 md:top-8 md:left-8">
                <div class="px-4 py-1.5 bg-primary text-background backdrop-blur-md rounded-full border border-primary/20">
                    <span class="font-label text-[10px] font-bold tracking-[0.2em] uppercase">Nova Conquista Desbloqueada</span>
                </div>
            </div>
        </div>

        <!-- Achievement Info -->
        <div class="flex-1 w-full p-6 md:p-10 flex flex-col bg-surface-container min-h-0">
            <div class="flex-1 overflow-y-auto mb-6 pr-2 custom-scrollbar">
                <div class="flex flex-col gap-2">
                    <h2 class="font-headline text-2xl md:text-4xl font-extrabold text-on-surface tracking-tighter">
                        {{ achievement().name }}
                    </h2>
                    <p class="font-body text-on-surface-variant text-sm md:text-base leading-relaxed max-w-lg">
                        {{ achievement().requirement }}
                    </p>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 mt-auto">
                <button (click)="viewAchievements()"
                        class="flex-1 py-3 md:py-4 bg-gradient-to-r from-primary to-primary-dim text-background font-bold rounded-xl shadow-[0_0_20px_rgba(63,194,251,0.25)] hover:shadow-[0_0_30px_rgba(63,194,251,0.4)] transition-all active:scale-[0.98] text-sm md:text-base">
                    Mostrar minhas conquistas
                </button>
                <button (click)="close()"
                        class="px-8 md:px-10 py-3 md:py-4 bg-surface-container-high text-on-surface font-bold rounded-xl hover:bg-surface-bright transition-colors active:scale-[0.98] text-sm md:text-base">
                    Fechar
                </button>
            </div>
        </div>
    </div>
</div>
}
