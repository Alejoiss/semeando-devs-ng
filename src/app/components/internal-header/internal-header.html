<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-20 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/15">
    <div class="flex items-center gap-8">
        <h1 class="text-2xl font-black tracking-tighter text-[#3fc2fb] uppercase font-headline">
            <a class="brand" routerLink="/app">
                <img src="assets/logos/semeando.devs.horizontal.darkbg.svg" alt="Logo Semeando Devs" width="100" />
            </a>
        </h1>
        <!-- <nav class="hidden md:flex items-center gap-6 font-label text-sm tracking-wide">
            <a class="text-[#3fc2fb] border-b-2 border-[#3fc2fb] pb-1 hover:text-[#fe69ac] transition-colors duration-300" href="#">Módulos</a>
            <a class="text-[#dee5ff] opacity-70 hover:text-[#fe69ac] transition-colors duration-300" href="#">Academia</a>
            <a class="text-[#dee5ff] opacity-70 hover:text-[#fe69ac] transition-colors duration-300" href="#">Comunidade</a>
            <a class="text-[#dee5ff] opacity-70 hover:text-[#fe69ac] transition-colors duration-300" href="#">Inventário</a>
        </nav> -->
    </div>
    <div class="flex items-center gap-4">
        <div class="hidden lg:flex items-center bg-surface-container rounded-full px-4 py-1.5 gap-3 border border-outline-variant/10 transition-all duration-300"
            [class.animate-xp-pulse]="isPulsing()">
            <span class="material-symbols-outlined text-tertiary text-sm" data-icon="bolt">bolt</span>
            <span class="font-label text-xs font-bold text-tertiary">{{ displayXp() | number:'1.0-0' }} XP</span>
        </div>
        <div class="hidden lg:flex items-center bg-surface-container rounded-full px-4 py-1.5 gap-3 border border-outline-variant/10 transition-all duration-300">
            <img src="assets/seed/seed.png" alt="Seeds" class="w-4 h-4 object-contain" />
            <span class="font-label text-xs font-bold text-tertiary">{{ displaySeeds() | number:'1.0-0' }} Seeds</span>
        </div>
        <div class="flex items-center gap-2 relative">
            @if (currentUser()?.isPro) {
                <div class="absolute -top-1 -right-1 z-10 bg-secondary rounded-full p-0.5 shadow-[0_0_10px_rgba(254,105,172,0.5)] flex items-center justify-center">
                    <span class="material-symbols-outlined text-[10px] text-white font-black" data-icon="star">star</span>
                </div>
            }
            <a routerLink="/app/perfil" class="h-10 w-10 rounded-full overflow-hidden border-2 border-primary/20 ring-2 ring-background ring-offset-2 ring-offset-primary/10 hover:border-primary/50 transition-all duration-300 block">
                @if (currentUser()?.avatar) {
                    <img [src]="currentUser()?.avatar" alt="User profile avatar" class="w-full h-full object-cover" />
                } @else {
                    <div class="w-full h-full bg-surface-container-high flex items-center justify-center">
                        <span class="material-symbols-outlined text-on-surface-variant text-xl">person</span>
                    </div>
                }
            </a>
        </div>
    </div>
</header>
