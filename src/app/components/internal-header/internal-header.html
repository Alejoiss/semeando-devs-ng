<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-20 bg-[#060e20]">
    <div class="flex items-center gap-8">
        <h1 class="text-2xl font-black tracking-tighter text-[#3fc2fb] uppercase font-headline">
            <a class="brand" routerLink="/app">
                <img src="assets/logos/semeando.devs.horizontal.darkbg.svg" alt="Logo Semeando Devs" width="100" />
            </a>
        </h1>
        <nav class="hidden md:flex items-center gap-6 font-label text-sm tracking-wide">
            <a class="text-[#3fc2fb] border-b-2 border-[#3fc2fb] pb-1 hover:text-[#fe69ac] transition-colors duration-300" href="#">Módulos</a>
            <a class="text-[#dee5ff] opacity-70 hover:text-[#fe69ac] transition-colors duration-300" href="#">Academia</a>
            <a class="text-[#dee5ff] opacity-70 hover:text-[#fe69ac] transition-colors duration-300" href="#">Comunidade</a>
            <a class="text-[#dee5ff] opacity-70 hover:text-[#fe69ac] transition-colors duration-300" href="#">Inventário</a>
        </nav>
    </div>
    <div class="flex items-center gap-4">
        <div class="hidden lg:flex items-center bg-surface-container rounded-full px-4 py-1.5 gap-3 border border-outline-variant/10">
            <span class="material-symbols-outlined text-tertiary text-sm" data-icon="bolt">bolt</span>
            <span class="font-label text-xs font-bold text-tertiary">{{ totalXp() | number:'1.0-0' }} XP</span>
        </div>
        <div class="flex items-center gap-2">
            <button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
                <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
            </button>
            <div class="h-10 w-10 rounded-full overflow-hidden border-2 border-primary/20 ring-2 ring-background ring-offset-2 ring-offset-primary/10">
                <img alt="User profile avatar" class="w-full h-full object-cover"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCuErcg7bdaloYgsv4K4-RVFJdVWYZaYIuO62198DyUCbh38e3kAn5i8GPtQzg_LECV1iGkNCiQDp1aAUT6uKwWaLIIIYlK6d_-DHrlqkS-S4DDbS5e7TjsDI0bV4tkCSA3rpuV1G26GkdQMQSfYBrpu7aPGWApv_vrdiZp137O87K--ta7JpoKwqeFkUzEF5yp8QUJC9oxSHrkzwLi13WuqqEcpuuJQ6PFmRFU7-fyz80QGh2POLbip0gvPux7fnZDAO8jgEInadM" />
            </div>
        </div>
    </div>
</header>
